<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Feliz Día de la Mujer</title>

<style>

body{
margin:0;
overflow:hidden;
background:black;
color:white;
font-family:Georgia;
}

/* PANTALLAS */

#pantalla1,#pantalla2{
position:absolute;
width:100%;
height:100%;
}

#pantalla2{
display:none;
background:linear-gradient(135deg,#ff4da6,#8a2be2);
text-align:center;
padding:60px;
overflow:hidden;
}

/* FOTO */

.foto{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
width:200px;
height:200px;
border-radius:50%;
border:6px solid #ff4da6;
box-shadow:0 0 25px #ff4da6;
object-fit:cover;
z-index:5;
}

/* TITULO */

.titulo{
font-size:60px;
margin-top:60px;
text-shadow:0 0 10px white;
}

/* MENSAJE */

#mensaje{
font-size:30px;
max-width:900px;
margin:auto;
margin-top:50px;
line-height:1.6;
min-height:200px;
}

/* PETALOS */

.petalo{
position:absolute;
top:-50px;
font-size:24px;
animation:caer linear infinite;
}

@keyframes caer{

0%{
transform:translateY(-50px) rotate(0deg);
opacity:1;
}

100%{
transform:translateY(110vh) rotate(360deg);
opacity:0;
}

}

canvas{
position:absolute;
top:0;
left:0;
}

</style>
</head>

<body>

<audio id="musica" autoplay loop muted>
<source src="mother.mp3" type="audio/mpeg">
</audio>

<!-- PANTALLA 1 -->
<div class="center">
💌 Haz click en la pantalla 💌
</div>

<div id="pantalla1">

<img src="madre.jpeg" class="foto">


<canvas id="canvas"></canvas>

</div>

<!-- PANTALLA 2 -->

<div id="pantalla2">

<div class="titulo">
FELIZ DÍA DE LA MUJER
</div>

<div id="mensaje"></div>

</div>

<script>
window.addEventListener("load", () => {

const musica = document.getElementById("musica")

musica.muted = false
musica.play().catch(() => {})

})
/* CAMBIO DE PANTALLA */
document.addEventListener("click", () => {
document.getElementById("musica").play()
})
setTimeout(()=>{

document.getElementById("pantalla1").style.display="none"
document.getElementById("pantalla2").style.display="block"

document.getElementById("musica").play()

escribirTexto()
crearPetalos()
fuegos()

},10000)
/* TEXTO MAQUINA DE ESCRIBIR */

const texto=`

¡Feliz día de la Mujer a la mujer que ha cambiado mi vida!
Mamá, gracias por ser mi más grande aliada y mi modelo a seguir.

Eres única, valiosa y llena de luz.
Gracias por ser tú.

"Admiro tu fuerza, 
valentía y la dulzura con la que enfrentas todo".

Quiero que sepas que siempre te llevo en mi mente 
y en mi corazón. Como un recordatorio de que eres 
la persona que más admiro.  Att: Bryan ❤️
`

let i=0

function escribirTexto(){

const elemento=document.getElementById("mensaje")

if(i<texto.length){

elemento.innerHTML+=texto.charAt(i)

i++

setTimeout(escribirTexto,150)

}

}

/* PETALOS */

function crearPetalos(){

setInterval(()=>{

let petalo=document.createElement("div")

petalo.className="petalo"

petalo.innerHTML="🌸"

petalo.style.left=Math.random()*100+"vw"

petalo.style.animationDuration=5+Math.random()*5+"s"

petalo.style.fontSize=20+Math.random()*20+"px"

document.body.appendChild(petalo)

setTimeout(()=>petalo.remove(),10000)

},300)

}

/* FUEGOS ARTIFICIALES */

function fuegos(){

setInterval(()=>{

let fire=document.createElement("div")

fire.innerHTML="✨"

fire.style.position="absolute"
fire.style.left=Math.random()*100+"vw"
fire.style.top=Math.random()*100+"vh"
fire.style.fontSize="30px"

document.body.appendChild(fire)

setTimeout(()=>fire.remove(),800)

},500)

}

/* CORAZON PARTICULAS */

const canvas=document.getElementById("canvas")
const ctx=canvas.getContext("2d")

canvas.width=window.innerWidth
canvas.height=window.innerHeight

function heart(t){

let x=16*Math.pow(Math.sin(t),3)
let y=-(13*Math.cos(t)-5*Math.cos(2*t)-2*Math.cos(3*t)-Math.cos(4*t))

return{x,y}

}

let particles=[]

for(let i=0;i<2500;i++){

let t=Math.random()*Math.PI*2

let pos=heart(t)

particles.push({

x:(Math.random()-0.5)*800,
y:(Math.random()-0.5)*800,
z:(Math.random()-0.5)*800,

tx:pos.x*15,
ty:pos.y*15,
tz:(Math.random()-0.5)*50

})

}

let angle=0

function project(x,y,z){

let scale=600/(600+z)

return{

x:x*scale+canvas.width/2,
y:y*scale+canvas.height/2

}

}

function animate(){

ctx.fillStyle="rgba(0,0,0,0.25)"
ctx.fillRect(0,0,canvas.width,canvas.height)

angle+=0.01

particles.forEach(p=>{

p.x+=(p.tx-p.x)*0.02
p.y+=(p.ty-p.y)*0.02
p.z+=(p.tz-p.z)*0.02

let cos=Math.cos(angle)
let sin=Math.sin(angle)

let rx=p.x*cos-p.z*sin
let rz=p.x*sin+p.z*cos

let proj=project(rx,p.y,rz)

ctx.beginPath()
ctx.arc(proj.x,proj.y,2,0,Math.PI*2)

ctx.fillStyle="#ff4da6"
ctx.fill()

})

requestAnimationFrame(animate)

}

animate()

</script>

</body>
</html>
